name: aurelius

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aurelius_db}
      POSTGRES_USER: ${POSTGRES_USER:-aurelius}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-AureliusPg_2026!ChangeMe}
    ports:
      - "${POSTGRES_PORT:-55433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aurelius} -d ${POSTGRES_DB:-aurelius_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-AureliusRedis_2026!ChangeMe}"]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-AureliusRedis_2026!ChangeMe} ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6335}:6333"
      - "${QDRANT_GRPC_PORT:-6336}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e 'GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q 'healthz check passed'"]
      interval: 15s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../server
      dockerfile: ../infra/backend.Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./.env.production
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://aurelius:AureliusPg_2026!ChangeMe@postgres:5432/aurelius_db?options=-csearch_path%3Dapp,public}
      REDIS_URL: ${REDIS_URL:-redis://:AureliusRedis_2026!ChangeMe@redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      PYTHONPATH: /app
      CHAT_UPLOAD_ROOT: ${CHAT_UPLOAD_ROOT:-/app/data/chat}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "${API_PORT:-5100}:5000"
    volumes:
      - chat_uploads:/app/data/chat
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ../server
      dockerfile: ../infra/backend.Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./.env.production
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://aurelius:AureliusPg_2026!ChangeMe@postgres:5432/aurelius_db?options=-csearch_path%3Dapp,public}
      REDIS_URL: ${REDIS_URL:-redis://:AureliusRedis_2026!ChangeMe@redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-lc", "PYTHONPATH=/app python scripts/retry_worker.py"]

  scheduler:
    build:
      context: ../server
      dockerfile: ../infra/backend.Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./.env.production
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://aurelius:AureliusPg_2026!ChangeMe@postgres:5432/aurelius_db?options=-csearch_path%3Dapp,public}
      REDIS_URL: ${REDIS_URL:-redis://:AureliusRedis_2026!ChangeMe@redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-lc", "PYTHONPATH=/app python scripts/retry_scheduler.py"]

  web:
    build:
      context: ../client
      dockerfile: ../infra/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5100}
    restart: unless-stopped
    env_file:
      - ./.env.production
    environment:
      HOSTNAME: "0.0.0.0"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3100}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-http://localhost}
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  chat_uploads:
  caddy_data:
  caddy_config:
