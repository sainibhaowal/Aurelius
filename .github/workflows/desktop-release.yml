name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target_name: nsis
          - os: ubuntu-22.04
            target_name: deb
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Verify app URL
        shell: bash
        run: |
          if [ -z "${{ vars.AURELIUS_APP_URL }}" ]; then
            echo "AURELIUS_APP_URL repository variable is required for desktop builds." >&2
            exit 1
          fi

      - name: Prepare desktop config
        working-directory: desktop
        env:
          AURELIUS_APP_URL: ${{ vars.AURELIUS_APP_URL }}
        run: npm run prepare:config

      - name: Build desktop package
        working-directory: desktop
        env:
          AURELIUS_APP_URL: ${{ vars.AURELIUS_APP_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: aurelius-windows
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: aurelius-linux
          path: desktop/src-tauri/target/release/bundle/deb/*.deb